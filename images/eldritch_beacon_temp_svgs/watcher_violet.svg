<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Watcher Violet">
  <title>Watcher Violet</title>
  <defs>
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.8"/>
    </filter>
  </defs>
  <g fill="none" stroke="#111111" stroke-linecap="round" stroke-linejoin="round" filter="url(#roughen)">
    <!-- outer occult seal -->
    <circle cx="50" cy="50" r="38" stroke-width="4"/>
    <circle cx="50" cy="50" r="31" stroke-width="1.5" opacity="0.65"/>

    <!-- radiating tentacles -->
    <path d="M50 18 C47 8, 57 7, 54 2" stroke-width="4"/>
    <path d="M64 22 C70 12, 80 18, 78 8" stroke-width="4"/>
    <path d="M76 34 C88 30, 89 42, 98 38" stroke-width="4"/>
    <path d="M82 50 C94 48, 94 58, 99 58" stroke-width="4"/>
    <path d="M74 67 C86 72, 78 82, 90 88" stroke-width="4"/>
    <path d="M60 78 C65 90, 54 92, 58 99" stroke-width="4"/>
    <path d="M40 78 C35 90, 46 92, 42 99" stroke-width="4"/>
    <path d="M26 67 C14 72, 22 82, 10 88" stroke-width="4"/>
    <path d="M18 50 C6 48, 6 58, 1 58" stroke-width="4"/>
    <path d="M24 34 C12 30, 11 42, 2 38" stroke-width="4"/>
    <path d="M36 22 C30 12, 20 18, 22 8" stroke-width="4"/>

    <!-- eye shape -->
    <path d="M19 50 C28 33, 72 33, 81 50 C72 67, 28 67, 19 50 Z" fill="#F2E9D8" stroke-width="4"/>
    <circle cx="50" cy="50" r="13" fill="#6B4A7A" stroke-width="3"/>
    <circle cx="50" cy="50" r="6" fill="#111111" stroke-width="2"/>
    <circle cx="54" cy="45" r="2.2" fill="#F2E9D8" stroke="none"/>

    <!-- engraving lines -->
    <path d="M25 45 C35 40, 65 40, 75 45" stroke-width="1.3" opacity="0.65"/>
    <path d="M25 55 C35 60, 65 60, 75 55" stroke-width="1.3" opacity="0.65"/>
    <path d="M35 28 C42 24, 58 24, 65 28" stroke-width="1"/>
    <path d="M35 72 C42 76, 58 76, 65 72" stroke-width="1"/>
  </g>
</svg>