<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Territory Pattern Chart">
  <title>Territory Pattern Chart</title>
  <defs>
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" result="noise"/>
