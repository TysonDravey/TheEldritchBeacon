    <path d="M50 10 L50 90" stroke-width="1.5"/>
    <path d="M10 50 L90 50" stroke-width="1.5"/>
    <path d="M22 22 L78 78" stroke-width="1.2"/>
    <path d="M78 22 L22 78" stroke-width="1.2"/>
  </g>

</svg>
